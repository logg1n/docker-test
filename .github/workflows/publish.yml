name: Build and Push Docker Image to GHCR

on:
  workflow_dispatch:
  push:
    tags:
      - '*' # Реагируем на теги

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # ЖЕЛЕЗОБЕТОННАЯ ЗАЩИТА №1: 
    # Эта работа вообще не запустится при мерже веток. Она включится ТОЛЬКО для тегов!
    if: github.ref_type == 'tag'
    
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ЖЕЛЕЗОБЕТОННАЯ ЗАЩИТА №2 (Ваш пограничник):
      # Проверяет, что этот тег был создан строго от ветки main
      - name: Verify tag is on main branch
        run: |
          if git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "Success: Tag is based on main branch."
          else
            echo "ERROR: Tag must be created from main branch!"
            exit 1
          fi

      # Дальше ваши стандартные шаги сборки...
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Теперь здесь никогда не будет пустоты, потому что сюда дойдут ТОЛЬКО теги!
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
