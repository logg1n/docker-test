name: Build and Push Docker Image to GHCR

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    if: github.ref_type == 'tag' || github.event_name == 'release'
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin main --depth=100
          if git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "Success: Tag is based on main branch."
          else
            echo "ERROR: Tag must be created from main branch!"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Переводим название репозитория в нижний регистр на отдельном шаге
      - name: Downcase repository name
        id: string
        run: |
          echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Используем подготовленное имя в нижнем регистре из предыдущего шага
          images: ghcr.io/${{ steps.string.outputs.repo }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
